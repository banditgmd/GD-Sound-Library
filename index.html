<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>GD Sound Library</title>
<style>
@font-face {
  font-family: 'Pusab';
  src: url('https://gdcolon.com/assets/Pusab.ttf') format('truetype');
  font-display: swap;
}

:root {
  --brown-dark:   #2E1A0A;
  --brown-mid:    #5C3A1E;
  --brown-panel:  #3D200E;
  --gold:         #FFC800;
  --green-hi:     #7ADE2D;
  --green-lo:     #5BB520;
  --green-border: #3D7A10;
  --green-shadow: #2A5510;
  --blue-hi:      #5A7ACA;
  --blue-lo:      #3A5AAA;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Pusab', 'Arial Black', sans-serif;
  background: #287DFF url('https://gdcolon.com/assets/gdfont/bg.jpg') repeat fixed center / cover;
  min-height: 100vh;
  color: #fff;
  overflow-x: hidden;
}

.shadow-lg {
  text-shadow:
    4px 4px 0 #000, -4px 4px 0 #000, 4px -4px 0 #000, -4px -4px 0 #000,
    0 4px 0 #000, 0 -4px 0 #000, 4px 0 0 #000, -4px 0 0 #000;
}
.shadow-sm {
  text-shadow:
    2px 2px 0 #000, -2px 2px 0 #000, 2px -2px 0 #000, -2px -2px 0 #000,
    0 2px 0 #000, 0 -2px 0 #000, 2px 0 0 #000, -2px 0 0 #000;
}

/* ---- header ---- */

header { text-align: center; padding: 40px 20px 20px; }

.header-title {
  font-size: clamp(36px, 7vw, 72px);
  line-height: 1.1;
  letter-spacing: 3px;
  text-shadow:
    4px 4px 0 #000, -4px 4px 0 #000, 4px -4px 0 #000, -4px -4px 0 #000,
    0 4px 0 #000, 0 -4px 0 #000, 4px 0 0 #000, -4px 0 0 #000,
    0 0 20px rgba(255,200,0,0.4);
  margin-bottom: 4px;
}

.header-subtitle {
  font-size: clamp(16px, 3vw, 26px);
  color: #FF94FF;
  text-shadow: 2px 2px 0 #000, -2px 2px 0 #000, 2px -2px 0 #000, -2px -2px 0 #000;
  margin-bottom: 20px;
  letter-spacing: 2px;
}

.header-stats {
  display: flex;
  justify-content: center;
  gap: 12px;
  flex-wrap: wrap;
  margin-bottom: 24px;
}

.stat-badge {
  background: rgba(0,0,0,0.4);
  border: 2px solid rgba(255,255,255,0.2);
  border-radius: 20px;
  padding: 5px 16px;
  font-size: 13px;
  letter-spacing: 1px;
}

.stat-badge strong {
  color: var(--gold);
  text-shadow: 1px 1px 0 #000, -1px 1px 0 #000, 1px -1px 0 #000, -1px -1px 0 #000;
}

/* ---- layout ---- */

.main-panel { max-width: 1260px; margin: 0 auto 40px; padding: 0 16px; }

.panel-box {
  background: var(--brown-mid);
  border: 4px solid var(--brown-dark);
  border-radius: 14px;
  box-shadow:
    inset 0 3px 0 rgba(255,255,255,0.12),
    inset 0 -3px 0 rgba(0,0,0,0.3),
    0 6px 0 #1A0A04,
    0 8px 20px rgba(0,0,0,0.5);
  padding: 4px;
  margin-bottom: 20px;
}

.panel-inner {
  background: var(--brown-panel);
  border-radius: 10px;
  border: 2px solid rgba(0,0,0,0.4);
  padding: 18px;
}

.panel-title {
  background: linear-gradient(to bottom, #8B5E2A, #6B4018);
  border: 2px solid #3D2010;
  border-bottom: 3px solid #2E1508;
  border-radius: 8px;
  text-align: center;
  padding: 7px 16px;
  margin: -18px -18px 16px;
  box-shadow: 0 3px 0 rgba(0,0,0,0.3);
}

.panel-title span {
  font-size: 15px;
  letter-spacing: 2px;
  color: var(--gold);
  text-shadow:
    1px 1px 0 #000, -1px 1px 0 #000, 1px -1px 0 #000, -1px -1px 0 #000,
    0 0 12px rgba(255,200,0,0.5);
}

/* ---- buttons ---- */

.gd-btn {
  font-family: 'Pusab', sans-serif;
  font-size: 14px;
  letter-spacing: 1px;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 11px 22px;
  transition: filter 0.1s, transform 0.1s;
  white-space: nowrap;
  user-select: none;
}

.gd-btn:active { transform: translateY(2px); }

.btn-green {
  background: linear-gradient(to bottom, var(--green-hi), var(--green-lo));
  border: 3px solid var(--green-border);
  box-shadow: inset 0 2px 0 rgba(255,255,255,0.3), 0 4px 0 var(--green-shadow), 0 5px 10px rgba(0,0,0,0.3);
  color: #1A3A08;
  text-shadow: 0 1px 0 rgba(255,255,255,0.3);
}

.btn-green:hover { filter: brightness(1.1); }
.btn-green:active { box-shadow: inset 0 2px 0 rgba(255,255,255,0.2), 0 1px 0 var(--green-shadow); }

/* ---- category pills ---- */

.cat-filters { display: flex; flex-wrap: wrap; gap: 8px; }

.cat-pill {
  font-family: 'Pusab', sans-serif;
  font-size: 11px;
  letter-spacing: 0.8px;
  padding: 7px 14px;
  border-radius: 7px;
  cursor: pointer;
  background: linear-gradient(to bottom, #4A5B8A, #323E6A);
  border: 2px solid #1E2A4A;
  box-shadow: inset 0 2px 0 rgba(255,255,255,0.18), 0 3px 0 #121A30;
  color: #d0d8ff;
  text-shadow: 1px 1px 0 #000;
  display: inline-flex;
  align-items: center;
  gap: 5px;
  transition: filter 0.1s, transform 0.08s;
}

.cat-pill:hover { filter: brightness(1.2); }
.cat-pill:active { transform: translateY(1px); }

.cat-pill.active {
  background: linear-gradient(to bottom, var(--green-hi), var(--green-lo));
  border-color: var(--green-border);
  box-shadow: inset 0 2px 0 rgba(255,255,255,0.3), 0 3px 0 var(--green-shadow);
  color: #1A3A08;
  text-shadow: none;
}

/* ---- search ---- */

.search-wrap { position: relative; margin-bottom: 14px; }

.search-icon {
  position: absolute;
  left: 14px;
  top: 50%;
  transform: translateY(-50%);
  opacity: 0.5;
  pointer-events: none;
  font-size: 16px;
}

#search {
  width: 100%;
  background: rgba(0,0,0,0.35);
  border: 2px solid rgba(255,255,255,0.15);
  border-radius: 8px;
  color: #fff;
  font-family: 'Pusab', sans-serif;
  font-size: 14px;
  letter-spacing: 1px;
  padding: 12px 16px 12px 42px;
  outline: none;
  box-shadow: inset 0 2px 6px rgba(0,0,0,0.4);
  transition: border-color 0.15s, box-shadow 0.15s;
}

#search::placeholder { color: rgba(255,255,255,0.35); }

#search:focus {
  border-color: rgba(255,200,0,0.6);
  box-shadow: inset 0 2px 6px rgba(0,0,0,0.4), 0 0 0 2px rgba(255,200,0,0.2);
}

/* ---- results bar ---- */

.results-bar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 14px;
  flex-wrap: wrap;
  gap: 8px;
}

.results-count { font-size: 12px; letter-spacing: 1px; color: rgba(255,255,255,0.55); }
.results-count strong { color: var(--gold); }

/* ---- grid ---- */

#grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(270px, 1fr));
  gap: 12px;
}

/* ---- cards ---- */

.card {
  background: linear-gradient(to bottom, #3A2512, #2A180A);
  border: 2px solid #1A0C04;
  border-radius: 10px;
  box-shadow: inset 0 2px 0 rgba(255,255,255,0.07), 0 3px 0 #110804, 0 4px 12px rgba(0,0,0,0.35);
  padding: 12px 14px;
  display: flex;
  flex-direction: column;
  gap: 10px;
  transition: filter 0.12s, transform 0.12s;
  position: relative;
  overflow: hidden;
}

/* category accent stripe */
.card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 3px;
  background: var(--cat-accent, rgba(255,255,255,0.1));
  opacity: 0.7;
}

.card:hover { filter: brightness(1.12); transform: translateY(-1px); }

.card.playing {
  border-color: var(--green-lo);
  animation: cardGlow 1.8s ease-in-out infinite;
}

@keyframes cardGlow {
  0%, 100% { box-shadow: inset 0 2px 0 rgba(255,255,255,0.1), 0 3px 0 var(--green-shadow), 0 0 14px rgba(122,222,45,0.2); }
  50%       { box-shadow: inset 0 2px 0 rgba(255,255,255,0.1), 0 3px 0 var(--green-shadow), 0 0 28px rgba(122,222,45,0.45); }
}

.card-top { display: flex; align-items: flex-start; gap: 10px; }

.cat-icon {
  font-size: 20px;
  flex-shrink: 0;
  filter: drop-shadow(1px 1px 0 rgba(0,0,0,0.8));
  line-height: 1;
  margin-top: 1px;
}

.card-info { flex: 1; min-width: 0; }

.card-name {
  font-size: 13px;
  letter-spacing: 0.8px;
  text-shadow: 1px 1px 0 #000, -1px 1px 0 #000, 1px -1px 0 #000, -1px -1px 0 #000;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  margin-bottom: 3px;
}

.card-cat {
  font-size: 10px;
  letter-spacing: 0.5px;
  color: var(--cat-accent, rgba(255,255,255,0.5));
  text-shadow: 1px 1px 0 rgba(0,0,0,0.8);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.card-actions { display: flex; gap: 7px; }

.btn-play {
  flex: 1;
  font-family: 'Pusab', sans-serif;
  font-size: 11px;
  letter-spacing: 1px;
  padding: 7px 8px;
  border-radius: 6px;
  cursor: pointer;
  background: linear-gradient(to bottom, var(--green-hi), var(--green-lo));
  border: 2px solid var(--green-border);
  box-shadow: inset 0 2px 0 rgba(255,255,255,0.3), 0 3px 0 var(--green-shadow);
  color: #1A3A08;
  text-shadow: 0 1px 0 rgba(255,255,255,0.2);
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 5px;
  transition: filter 0.1s, transform 0.08s;
}

.btn-play:hover { filter: brightness(1.1); }
.btn-play:active { transform: translateY(1px); box-shadow: inset 0 2px 0 rgba(255,255,255,0.2), 0 1px 0 var(--green-shadow); }

.btn-play.playing {
  background: linear-gradient(to bottom, #ff6b6b, #cc3333);
  border-color: #881111;
  box-shadow: inset 0 2px 0 rgba(255,255,255,0.25), 0 3px 0 #550A0A;
  color: #fff;
  text-shadow: 1px 1px 0 #000;
}

.btn-dl {
  font-family: 'Pusab', sans-serif;
  font-size: 11px;
  letter-spacing: 1px;
  padding: 7px 12px;
  border-radius: 6px;
  cursor: pointer;
  background: linear-gradient(to bottom, var(--blue-hi), var(--blue-lo));
  border: 2px solid #2A3D7A;
  box-shadow: inset 0 2px 0 rgba(255,255,255,0.2), 0 3px 0 #1A2D5A;
  color: #fff;
  text-shadow: 1px 1px 0 #000;
  text-decoration: none;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  transition: filter 0.1s, transform 0.08s;
}

.btn-dl:hover { filter: brightness(1.15); }
.btn-dl:active { transform: translateY(1px); }

/* card footer */
.card-footer { display: flex; align-items: center; justify-content: flex-end; gap: 6px; }

.wave-bars {
  display: none;
  align-items: flex-end;
  gap: 2px;
  height: 16px;
  margin-right: auto;
}

.card.playing .wave-bars { display: flex; }

.wave-bar {
  width: 3px;
  background: var(--green-hi);
  border-radius: 2px;
  animation: wavebar 0.6s ease-in-out infinite alternate;
  box-shadow: 0 0 4px rgba(122,222,45,0.6);
}

.wave-bar:nth-child(1) { animation-delay: 0s;    height: 40%; }
.wave-bar:nth-child(2) { animation-delay: 0.1s;  height: 80%; }
.wave-bar:nth-child(3) { animation-delay: 0.05s; height: 60%; }
.wave-bar:nth-child(4) { animation-delay: 0.15s; height: 100%; }
.wave-bar:nth-child(5) { animation-delay: 0.08s; height: 50%; }

@keyframes wavebar { to { transform: scaleY(0.2); } }

.card-id {
  font-size: 9px;
  color: rgba(255,255,255,0.22);
  letter-spacing: 0.5px;
  cursor: default;
}

/* ---- no results ---- */

#no-results { display: none; text-align: center; padding: 60px 20px; }
#no-results .emoji { font-size: 48px; margin-bottom: 12px; }
#no-results p {
  font-size: 16px;
  letter-spacing: 1px;
  color: rgba(255,255,255,0.5);
  text-shadow: 1px 1px 0 #000;
}

/* ---- zip bar ---- */

.dl-all-row { display: flex; justify-content: center; gap: 12px; flex-wrap: wrap; margin-bottom: 20px; }

#zip-area { text-align: center; margin-top: 10px; display: none; }

#zip-msg {
  font-size: 12px;
  letter-spacing: 1px;
  color: var(--green-hi);
  text-shadow: 1px 1px 0 #000;
  margin-bottom: 6px;
}

.zip-bar-wrap {
  height: 8px;
  background: rgba(0,0,0,0.4);
  border-radius: 100px;
  border: 1px solid rgba(255,255,255,0.1);
  overflow: hidden;
  max-width: 300px;
  margin: 0 auto;
}

#zip-bar {
  height: 100%;
  width: 0;
  background: linear-gradient(90deg, var(--green-hi), var(--green-lo));
  border-radius: 100px;
  transition: width 0.1s;
  box-shadow: 0 0 8px rgba(122,222,45,0.5);
}

/* ---- footer ---- */

footer { text-align: center; padding: 28px 20px 40px; }

.footer-panel {
  display: inline-block;
  background: rgba(0,0,0,0.4);
  border: 2px solid rgba(255,255,255,0.1);
  border-radius: 10px;
  padding: 14px 28px;
  max-width: 700px;
}

.footer-credits { font-size: 11px; letter-spacing: 0.8px; color: rgba(255,255,255,0.5); line-height: 2; }
.footer-credits a { color: var(--gold); text-decoration: none; text-shadow: 1px 1px 0 rgba(0,0,0,0.8); transition: color 0.15s; }
.footer-credits a:hover { color: #fff; }
.footer-note { font-size: 10px; color: rgba(255,255,255,0.2); margin-top: 8px; letter-spacing: 0.5px; }

/* ---- toast ---- */

#toast {
  position: fixed;
  bottom: 28px;
  left: 50%;
  transform: translateX(-50%) translateY(10px);
  background: var(--brown-dark);
  border: 2px solid rgba(255,200,0,0.4);
  border-radius: 8px;
  padding: 10px 22px;
  font-size: 13px;
  letter-spacing: 1px;
  color: var(--gold);
  text-shadow: 1px 1px 0 #000;
  box-shadow: 0 4px 0 #1A0A04, 0 6px 20px rgba(0,0,0,0.5);
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.25s, transform 0.25s;
  z-index: 999;
  white-space: nowrap;
}

#toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

@media (max-width: 580px) {
  #grid { grid-template-columns: 1fr; }
  .header-title { font-size: 32px; }
}
</style>
</head>

const CATEGORIES = ["Aquatic Sounds","Construction and Demolition","Creatures","Events and Fanfares","Explosions and Destruction","Fire and Flames","Footsteps","Impacts and Hits","Interface","Machines and Robotics","Melodic Stingers","Objects","Retro Sounds","Spells and Magic","Voice","Weapons"];

const EMOJI = {"Aquatic Sounds":"🌊","Construction and Demolition":"🏗️","Creatures":"🐉","Events and Fanfares":"🎺","Explosions and Destruction":"💥","Fire and Flames":"🔥","Footsteps":"👣","Impacts and Hits":"💢","Interface":"🖥️","Machines and Robotics":"🤖","Melodic Stingers":"🎵","Objects":"📦","Retro Sounds":"🕹️","Spells and Magic":"✨","Voice":"🗣️","Weapons":"⚔️"};

const COLORS = {"Aquatic Sounds":"#00cfff","Construction and Demolition":"#ff8c42","Creatures":"#69f0ae","Events and Fanfares":"#ffd740","Explosions and Destruction":"#ff5252","Fire and Flames":"#ff6d00","Footsteps":"#d7ccc8","Impacts and Hits":"#ff6b6b","Interface":"#82b1ff","Machines and Robotics":"#90caf9","Melodic Stingers":"#ea80fc","Objects":"#ccff90","Retro Sounds":"#ffe57f","Spells and Magic":"#e040fb","Voice":"#80deea","Weapons":"#ef9a9a"};

// pre-process once — avoids repeated string ops on every filter/render
const sounds = RAW_SOUNDS.map(s => {
  const parts = s.category.split(' / ');
  return {
    ...s,
    topCat:   parts[0],
    subLabel: parts.length > 1 ? parts.slice(1).join(' › ') : parts[0],
    url:      SFX_PATH + s.file,
    _name:    s.name.toLowerCase(),
    _cat:     s.category.toLowerCase(),
  };
});

let activeCategory = 'All';
let playing = null; // { audio, card }
let toastTimer = null;
let searchTimer = null;

// ---- audio ----

function togglePlay(id) {
  const card = document.querySelector(`[data-id="${id}"]`);
  const sound = sounds.find(s => s.id === id);

  if (playing?.card === card) {
    stopCurrent();
    return;
  }

  stopCurrent();

  const audio = new Audio(sound.url);
  audio.onended = () => { setCardPlaying(card, false); playing = null; };
  audio.onerror = () => { showToast('Could not load audio!'); setCardPlaying(card, false); playing = null; };
  audio.play();

  playing = { audio, card };
  setCardPlaying(card, true);
}

function stopCurrent() {
  if (!playing) return;
  playing.audio.pause();
  setCardPlaying(playing.card, false);
  playing = null;
}

function setCardPlaying(card, on) {
  const btn = card.querySelector('.btn-play');
  card.classList.toggle('playing', on);
  btn.classList.toggle('playing', on);
  btn.textContent = on ? '■ Stop' : '▶ Play';
}

// stop audio if page is navigated away / hidden
window.addEventListener('pagehide', stopCurrent);

// ---- rendering ----

function render() {
  const q = document.getElementById('search').value.toLowerCase().trim();
  const grid = document.getElementById('grid');
  const noRes = document.getElementById('no-results');

  const filtered = sounds.filter(s => {
    if (activeCategory !== 'All' && s.topCat !== activeCategory) return false;
    if (q && !s._name.includes(q) && !s._cat.includes(q) && !s.orig.includes(q)) return false;
    return true;
  });

  document.getElementById('results-count').innerHTML =
    `Showing <strong>${filtered.length}</strong> of ${sounds.length} sounds`;

  if (!filtered.length) {
    grid.style.display = 'none';
    noRes.style.display = 'block';
    return;
  }

  grid.style.display = '';
  noRes.style.display = 'none';

  // batch all DOM writes into a fragment — single reflow instead of 260
  const frag = document.createDocumentFragment();

  filtered.forEach(s => {
    const color = COLORS[s.topCat] || 'rgba(255,255,255,0.3)';
    const emoji = EMOJI[s.topCat] || '🔊';

    const card = document.createElement('div');
    card.className = 'card';
    card.dataset.id = s.id;
    card.style.setProperty('--cat-accent', color);
    card.innerHTML = `
      <div class="card-top">
        <div class="cat-icon">${emoji}</div>
        <div class="card-info">
          <div class="card-name" title="${s.name}">${s.name}</div>
          <div class="card-cat">${s.subLabel}</div>
        </div>
      </div>
      <div class="card-actions">
        <button class="btn-play">▶ Play</button>
        <a class="btn-dl" href="${s.url}" download="${s.file}" title="Download ${s.file}">⬇</a>
      </div>
      <div class="card-footer">
        <div class="wave-bars">
          <div class="wave-bar"></div><div class="wave-bar"></div>
          <div class="wave-bar"></div><div class="wave-bar"></div>
          <div class="wave-bar"></div>
        </div>
        <div class="card-id" title="Original ID: ${s.orig}">${s.orig}</div>
      </div>
    `;
    frag.appendChild(card);
  });

  grid.innerHTML = '';
  grid.appendChild(frag);
}

// event delegation — one listener on the grid vs one per card
document.getElementById('grid').addEventListener('click', e => {
  const btn = e.target.closest('.btn-play');
  if (btn) togglePlay(btn.closest('.card').dataset.id);
});

// debounced search — don't re-render on every single keystroke
document.getElementById('search').addEventListener('input', () => {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(render, 250);
});

// ---- category filters ----

function buildFilters() {
  const wrap = document.getElementById('cat-filters');
  ['All', ...CATEGORIES].forEach(cat => {
    const btn = document.createElement('button');
    btn.className = 'cat-pill' + (cat === 'All' ? ' active' : '');
    btn.textContent = (cat === 'All' ? '🎵 ' : (EMOJI[cat] || '🔊') + ' ') + cat;
    btn.addEventListener('click', () => {
      activeCategory = cat;
      wrap.querySelectorAll('.cat-pill').forEach(p => p.classList.remove('active'));
      btn.classList.add('active');
      render();
    });
    wrap.appendChild(btn);
  });
}

// ---- zip download ----

async function downloadZip() {
  const btn  = document.getElementById('btn-zip');
  const area = document.getElementById('zip-area');
  const msg  = document.getElementById('zip-msg');
  const bar  = document.getElementById('zip-bar');

  btn.disabled = true;
  area.style.display = 'block';

  const zip = new JSZip();

  for (let i = 0; i < sounds.length; i++) {
    const s = sounds[i];
    try {
      const blob = await fetch(s.url).then(r => r.blob());
      zip.file(s.file, blob);
    } catch {
      console.warn('skipping', s.file);
    }
    msg.textContent = `Packing... ${i + 1} / ${sounds.length}`;
    bar.style.width = ((i + 1) / sounds.length * 100) + '%';
  }

  msg.textContent = 'Generating zip...';
  const content = await zip.generateAsync({ type: 'blob' }, ({ percent }) => {
    bar.style.width = percent.toFixed(0) + '%';
  });

  const a = Object.assign(document.createElement('a'), {
    href: URL.createObjectURL(content),
    download: 'gd-sound-library.zip',
  });
  a.click();
  URL.revokeObjectURL(a.href);

  msg.textContent = 'Done!';
  bar.style.width = '100%';
  setTimeout(() => {
    area.style.display = 'none';
    bar.style.width = '0';
    btn.disabled = false;
  }, 2200);
}

document.getElementById('btn-zip').addEventListener('click', downloadZip);

// ---- toast ----

function showToast(text) {
  const toast = document.getElementById('toast');
  toast.textContent = text;
  toast.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => toast.classList.remove('show'), 2500);
}

// init
buildFilters();
render();
</script>
